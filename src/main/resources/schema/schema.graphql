directive @skipcodegen on OBJECT | INTERFACE | FIELD_DEFINITION
directive @uppercase on FIELD_DEFINITION
#directive @pageTest on FIELD_DEFINITION
#directive @paged on FIELD_DEFINITION

type Query{
    shows(titleFilter: String): [Show]
    bankInfo(id: ID!): BankInfoView
    bankInfos(query: BankInfoQuery): [BankInfoView]
    bankInfoPage(query:BankInfoPagedQuery): BankInfoPaged
    sysCodes(query:SysCodeQuery): [SysCodeView]
    sysCode(id: ID!): SysCodeView
    bankAccounts(query:BankAccountQuery): [BankAccount]
    bankAccountPage(query:BankAccountPagedQuery): BankAccountPaged
    bankAccount(id: ID!): BankAccount

    workCodes(query:WorkCodeQuery):[WorkCodeView]

    doIt(page:Int=0,size:Int=10):TestPage
#    bankAccountPaged(page:Int=0,size:Int=10):BankAccountPaged

#    bankAccountsTest(query:BankAccountQuery): [BankAccount] @pageTest

#    bankInfosPaged(page:Int=1,size:Int=10):BankInfoPage
}
input UpdateBankInfo{
    id: ID!
    addr: String
    name: String
    branchCode: String
    code: String
    enable: Boolean
    tel: String
}

input CreateBankInfo{
    addr: String
    name: String
    branchCode: String
    code: String
    enable: Boolean
    tel: String
}

type Mutation{
    deleteBankAccount(id: ID!): Boolean
    deleteBankInfo(id: ID!): Boolean
    updateBankInfo(input: UpdateBankInfo): BankInfoView
    createBankInfo(input: CreateBankInfo): BankInfoView
}

type BankAccountPaged @skipcodegen {
    content: [BankAccount]
    totalElements: Int
    totalPages: Int
    pageNumber: Int
}

type BankInfoPaged @skipcodegen {
    content: [BankInfoView]
    totalElements: Int
    totalPages: Int
    pageNumber: Int
}

type TestPage @skipcodegen {
    content: [BankInfoView]
    totalElements: Int
    totalPages: Int
    pageNumber: Int
}

